<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>电商大亨</title>
<style>
:root{--bg:#080c12;--panel:#111820;--border:#1c2530;--accent:#ff4757;--gold:#f9ca24;--green:#2ed573;--blue:#1e90ff;--purple:#a55eea;--text:#dfe6e9;--text2:#636e72;--card:#171d28;--self:#ff475722}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;touch-action:manipulation;font-size:12px}
.app{max-width:1340px;margin:0 auto;padding:8px}
.topbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;flex-wrap:wrap}
.topbar .logo{font-size:26px}
.topbar h1{font-size:14px;color:var(--accent);margin-right:auto}
.sp{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:5px 9px;min-width:70px;cursor:pointer;transition:0.2s}
.sp.clickable:hover{border-color:var(--accent)}
.sp .icon{font-size:15px}.sp .val{font-size:13px;font-weight:bold}.sp .lbl{font-size:7px;color:var(--text2)}
.day-badge{background:var(--accent);color:#fff;padding:4px 10px;border-radius:15px;font-weight:bold;font-size:11px}
.gauge-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.gauge-card{flex:1;min-width:85px;background:var(--card);border-radius:9px;padding:6px;text-align:center;cursor:pointer;transition:0.2s}
.gauge-card:hover{border:1px solid var(--accent)}
.gauge-card canvas{display:block;margin:0 auto}
.gauge-card .label{font-size:8px;color:var(--text2);margin-top:1px}
.layout{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px;overflow:hidden;cursor:pointer;transition:0.2s}
.panel:hover{border-color:rgba(255,71,87,0.3)}
.panel h3{font-size:10px;color:var(--accent);margin-bottom:5px;display:flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:1px}
.panel.w2{grid-column:span 2}.panel.w3{grid-column:span 3}.panel.w4{grid-column:span 4}
.scroll-area{overflow-y:auto;max-height:190px;scrollbar-width:thin;scrollbar-color:#1c2530 #111820}
.scroll-area::-webkit-scrollbar{width:4px}
.scroll-area::-webkit-scrollbar-track{background:#111820}
.scroll-area::-webkit-scrollbar-thumb{background:#1c2530;border-radius:2px}
.btn{padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-size:10px;font-weight:600;transition:0.2s;white-space:nowrap;touch-action:manipulation}
.btn.primary{background:var(--accent);color:#fff}.btn.primary:hover{background:#e84150}
.btn.gold{background:var(--gold);color:#111}.btn.green{background:var(--green);color:#111}
.btn.blue{background:var(--blue);color:#fff}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn.ghost:hover{background:#1c2530}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:4px}
.market-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px;cursor:pointer;transition:0.2s;text-align:center;touch-action:manipulation}
.market-card:hover,.market-card:active{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,0.3)}
.market-card .emoji{font-size:26px}.market-card .name{font-size:10px;font-weight:bold}.market-card .price{font-size:11px;color:var(--gold)}.market-card .trend{font-size:7px;padding:1px 6px;border-radius:4px;display:inline-block}.market-card .cat{font-size:7px;color:var(--text2);margin-top:1px}
.th{background:rgba(255,71,87,0.2);color:var(--accent)}.tc{background:rgba(99,110,114,0.2);color:var(--text2)}.tf{background:rgba(30,144,255,0.2);color:var(--blue)}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px}
.inv-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px;cursor:pointer;transition:0.2s;position:relative;touch-action:manipulation}
.inv-card:hover{border-color:var(--accent)}
.inv-card .emoji{font-size:24px}.inv-card .name{font-size:11px;font-weight:bold}.inv-card .detail{font-size:9px;color:var(--text2)}.inv-card .stkbar{height:3px;background:#1c2530;border-radius:2px;margin:3px 0}
.inv-card .stkfill{height:100%;background:var(--green);border-radius:2px}
.inv-card .qbtn{position:absolute;top:5px;right:5px;background:var(--accent);color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:9px;cursor:pointer;font-weight:bold;touch-action:manipulation}
.inv-card .qbtn:hover{background:#e84150}
.info-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);padding:5px 7px;border-radius:5px;margin:2px 0;font-size:10px;gap:5px}
.info-row.self{background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.4);font-weight:bold}
.info-row.self .rank-badge{background:var(--accent);color:#fff;padding:0px 6px;border-radius:4px;font-size:8px;margin-right:4px}
.mkt-btn{display:block;width:100%;text-align:left;padding:7px 9px;margin:3px 0;background:var(--card);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:10px;color:var(--text);transition:0.2s;touch-action:manipulation}
.mkt-btn:active,.mkt-btn:hover{border-color:var(--accent);background:#1c2530}
.mkt-btn .cost{float:right;color:var(--gold)}
.log-list{max-height:220px;overflow-y:auto;font-size:9px;line-height:1.8;scrollbar-width:thin;scrollbar-color:#1c2530 #111820}
.log-list::-webkit-scrollbar{width:3px}
.log-list::-webkit-scrollbar-track{background:#111820}
.log-list::-webkit-scrollbar-thumb{background:#1c2530;border-radius:2px}
.log{display:flex;gap:6px;align-items:baseline}.log .dt{color:var(--text2);min-width:35px;font-size:8px}
.log.good{color:var(--green)}.log.bad{color:#ff4757}.log.warn{color:var(--gold)}.log.info{color:var(--text)}
.rank-bar{height:6px;background:#1c2530;border-radius:3px;margin-top:3px}
.rank-fill{height:100%;background:var(--accent);border-radius:3px;transition:0.5s}
.rank-fill.self-fill{background:var(--gold)}
.loan-badge{background:rgba(255,71,87,0.2);padding:2px 8px;border-radius:6px;font-size:8px;cursor:pointer}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:999;justify-content:center;align-items:center}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;max-width:580px;width:95vw;max-height:90vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#1c2530 #111820}
.modal.large{max-width:720px}
.modal::-webkit-scrollbar{width:4px}.modal::-webkit-scrollbar-track{background:#111820}.modal::-webkit-scrollbar-thumb{background:#1c2530}
input[type=range]{-webkit-appearance:none;background:var(--card);height:6px;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer}
input[type=number]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;width:70px;text-align:center;font-size:12px}
input[type=number]:focus{outline:none;border-color:var(--accent)}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:7px;margin:1px}
.buff-tag{padding:2px 6px;border-radius:4px;font-size:8px;display:inline-block;margin:1px}
.restock-row{display:flex;align-items:center;gap:4px;background:var(--card);padding:4px 6px;border-radius:4px;margin:2px 0;font-size:9px}
.day-sale{font-size:8px;color:var(--text2);margin-top:3px;line-height:1.5}
.cal-nav{display:flex;gap:2px;margin-bottom:3px}
.cal-nav button{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:7px;padding:2px 0;border-radius:3px;cursor:pointer}
.report-tabs{display:flex;gap:4px;margin-bottom:8px}
.report-tab{flex:1;padding:4px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:9px}
.report-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chart-bar{display:inline-block;background:var(--accent);min-width:4px;border-radius:2px 2px 0 0;margin:0 1px;vertical-align:bottom}
.chart-label{font-size:6px;color:var(--text2);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:900px){.layout{grid-template-columns:1fr 1fr}.panel.w3{grid-column:span 2}.panel.w2{grid-column:span 2}.panel.w4{grid-column:span 2}.gauge-card{min-width:60px}.modal{max-width:95vw;max-height:90vh;padding:10px}}
@media(max-width:550px){.layout{grid-template-columns:1fr}.panel.w3,.panel.w2,.panel.w4{grid-column:span 1}.gauge-card{min-width:60px}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <span class="logo">🏪</span><h1>电商大亨</h1>

  <button class="btn primary" onclick="nextDay()">▶ 下一天</button>

</div>
<div class="gauge-row">

</div>
<div class="layout">
  <div class="panel w3" onclick="showMarketDetail()"><h3>📦 进货市场 <span style="color:var(--text2);font-weight:normal;letter-spacing:0">库存<span id="stkCur">0</span>/<span id="stkMax">30</span> | <span style="color:var(--gold);cursor:pointer" onclick="event.stopPropagation();showMarkupModal()">利润率<span id="mkpDisp">1.8x</span> ✎</span></span></h3><div style="display:flex;gap:2px;flex-wrap:wrap;margin-bottom:3px" id="catFilters" onclick="event.stopPropagation()"></div><div class="scroll-area" id="marketScroll"><div class="market-grid" id="market"></div></div><div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap"><button class="btn ghost" onclick="event.stopPropagation();showLoan()" style="font-size:8px">🏦 贷款</button><button class="btn ghost" onclick="event.stopPropagation();expandStorage()" style="font-size:8px">📦 扩容 ¥800(+10格)</button></div></div>
  <div class="panel" onclick="showCalendarDetail()"><h3>📅 促销日历</h3><div class="cal-nav" onclick="event.stopPropagation()"><button onclick="prevMonth()">◀</button><span id="calMonthLabel" style="font-size:8px;color:var(--text2);text-align:center;flex:2;line-height:2">第1年1月</span><button onclick="nextMonth()">▶</button></div><div id="calendar" style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-size:7px"></div><div style="font-size:7px;color:var(--text2);margin-top:2px">🔴大促 | 黄色边框=今天</div></div>
  <div class="panel w3" onclick="showInventoryDetail()"><h3>🏬 我的店铺 <span style="color:var(--text2);font-weight:normal;letter-spacing:0;font-size:8px;cursor:pointer" onclick="event.stopPropagation();showRestockPlan()">📋补货计划</span></h3><div class="scroll-area" id="invScroll"><div class="inv-grid" id="inventory"></div></div><div class="day-sale" id="daySaleDetail"></div></div>
  <div class="panel" onclick="showMktDetail()"><h3>📢 营销 <small style="color:var(--text2);font-weight:normal;letter-spacing:0">按天计费</small></h3><div id="mktPanel"></div><div id="buffs" style="font-size:7px;margin-top:4px"></div></div>
  <div class="panel" onclick="showRivalDetail()"><h3>⚔️ 排名 <small style="color:var(--text2);font-weight:normal;letter-spacing:0" id="rivalCount">22家</small></h3><div class="scroll-area" id="rivals"></div></div>
  <div class="panel" onclick="showEmpDetail()"><h3>👥 团队 <small id="empInfo" style="color:var(--text2);font-weight:normal;letter-spacing:0">详情</small></h3><div class="scroll-area"><div id="employees"></div></div><button class="btn ghost" onclick="event.stopPropagation();showHire()" style="width:100%;margin-top:3px;font-size:8px">➕ 招聘</button></div>
  <div class="panel" onclick="showTalentDetail()"><h3>🔮 天赋 <span style="color:var(--gold);font-weight:normal;letter-spacing:0">点:<span id="tp">3</span></span></h3><div id="talents"></div></div>
  <div class="panel" onclick="showLogDetail()"><h3>📋 经营日志</h3><div class="log-list" id="log"></div></div>
</div>
<div class="modal-overlay" id="mo"><div class="modal" id="mc"></div></div>
</div>

// ============ 辅助函数 ============
function safenum(v,fallback){return(typeof v==='number'&&isFinite(v))?v:(fallback||0);}
function fmt(v){return safenum(v,0).toLocaleString();}
function emojiOf(pid){var p=PRODUCTS.find(function(x){return x.id===pid;});return p?p.emoji:'📦';}
function nameOf(pid){var p=PRODUCTS.find(function(x){return x.id===pid;});return p?p.name:pid;}
function bpOf(pid){var p=PRODUCTS.find(function(x){return x.id===pid;});return p?p.bp:100;}

// 日期转换 (1年=360天=12月×30天)
function dayToDate(d){
  var year=Math.floor((d-1)/360)+1;
  var doy=(d-1)%360+1;
  var month=Math.ceil(doy/30);
  var mday=doy-(month-1)*30;
  return {year:year,month:month,day:mday,doy:doy};
}
function dateStr(d){
  var dt=dayToDate(d);
  return '第'+dt.year+'年'+dt.month+'月'+dt.day+'日';
}

function initRivals(){
  G.rivals=[];
  var total=RIVAL_NAMES.length;
  for(var i=0;i<total;i++){
    var unlockDay=(i<12)?1:(i<18)?10:20;
    G.rivals.push({name:RIVAL_NAMES[i],power:Math.floor(Math.random()*50+50),unlock:unlockDay});
  }
}

function initMarket(){
  PRODUCTS.forEach(function(p){
    var r=0.85+Math.random()*0.3;
    G.marketPrices[p.id]=Math.round(p.bc*r);
    G.priceHistory[p.id]=[G.marketPrices[p.id]];
    G.supplierFavor[p.id]=0;
  });
}

// ============ 日期导航 ============
function prevMonth(){
  G.calMonthOffset--;
  renderCalendar();
}
function nextMonth(){
  G.calMonthOffset++;
  renderCalendar();
}

function getCalMonthRange(){
  var d=G.day+G.calMonthOffset*30;
  var startDay=Math.max(1,Math.floor((d-1)/30)*30+1);
  var endDay=Math.min(360,Math.floor((d-1)/30)*30+30);
  return {start:startDay,end:endDay};
}

function renderCalendar(){
  var c=document.getElementById('calendar');
  var range=getCalMonthRange();
  var dt=dayToDate(range.start);
  document.getElementById('calMonthLabel').textContent='第'+dt.year+'年'+dt.month+'月';
  c.innerHTML='';

function totalStock(){return G.inventory.reduce(function(s,i){return s+safenum(i.stock);},0);}
function baseStock(){
  var s=30+(G.talents['perm_stock']||0)*10+G.storageExpanded*10;
  G.employees.forEach(function(e){if(e.eff==='stock'||e.eff==='all')s+=safenum(e.val);});

function getAvgCost(pid){
  var items=G.inventory.filter(function(i){return i.productId===pid&&i.purchaseLog&&i.purchaseLog.length>0;});
  var total=0,cnt=0;
  items.forEach(function(i){i.purchaseLog.forEach(function(l){total+=safenum(l.price)*safenum(l.qty);cnt+=safenum(l.qty);});});
  return cnt>0?Math.round(total/cnt):bpOf(pid);
}

function showPriceChart(pid){
  var p=PRODUCTS.find(function(x){return x.id===pid;});
  if(!p){closeModal();return;}
  var hist=G.priceHistory[pid]||[],cur=safenum(G.marketPrices[pid]||p.bc);
  var h='<h3>'+p.emoji+' '+p.name+' 价格走势图</h3><div style="font-size:12px;margin:6px 0">当前: <b style="color:var(--gold);font-size:16px">¥'+cur+'</b> | 底价: <b>¥'+safenum(p.bc)+'</b> | 共'+hist.length+'个数据点</div><div style="background:var(--card);border-radius:8px;padding:8px"><canvas id="pcCanvas" width="580" height="200" style="max-width:100%"></canvas></div><button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>';
  openModal(h,'large');
  setTimeout(function(){
    var pc=document.getElementById('pcCanvas');
    if(!pc||hist.length<2)return;
    var ctx=pc.getContext('2d'),w=pc.width,h=pc.height;
    var min=Math.min.apply(null,hist),max=Math.max.apply(null,hist),range=max-min||1,pad=40;
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle='#1c2530';ctx.lineWidth=0.5;
    for(var i=0;i<=4;i++){
      var y=pad+(h-pad*2)*(i/4);
      ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke();
      ctx.fillStyle='#636e72';ctx.font='9px "Microsoft YaHei"';ctx.textAlign='right';
      ctx.fillText('¥'+Math.round(max-(range*i/4)),pad-5,y+3);
    }
    ctx.beginPath();
    hist.forEach(function(v,i){
      var x=pad+i*((w-pad*2)/(Math.max(hist.length-1,1)));
      var y=pad+(h-pad*2)*(1-(v-min)/range);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    var lastX=pad+(hist.length-1)*((w-pad*2)/(Math.max(hist.length-1,1)));
    ctx.lineTo(lastX,pad+(h-pad*2));
    ctx.lineTo(pad,pad+(h-pad*2));ctx.closePath();
    ctx.fillStyle='rgba(255,71,87,0.1)';ctx.fill();
    ctx.strokeStyle='#ff4757';ctx.lineWidth=2;ctx.stroke();
  },80);
}

function drawMiniPriceChart(cid,hist,w,h){
  var c2=document.getElementById(cid);if(!c2||hist.length<2)return;
  var ctx=c2.getContext('2d'),min=Math.min.apply(null,hist),max=Math.max.apply(null,hist),range=max-min||1;
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();ctx.strokeStyle='#ff4757';ctx.lineWidth=1.2;
  hist.forEach(function(v,i){
    var x=2+i*((w-4)/(Math.max(hist.length-1,1)));
    var y=h-2-(h-4)*(1-(v-min)/range);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
}

      vals.push(v);if(v>maxV)maxV=v;
    }
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='#636e72';ctx.font='8px "Microsoft YaHei"';ctx.textAlign='right';
    for(var i=0;i<=4;i++){
      var yv=Math.round(maxV*(4-i)/4);
      var yy=20+(h-40)*(i/4);
      ctx.fillText('¥'+fmt(yv),35,yy+4);
      ctx.strokeStyle='#1c2530';ctx.beginPath();ctx.moveTo(40,yy);ctx.lineTo(w-10,yy);ctx.stroke();
    }
    var bw=Math.max(6,(w-50)/vals.length-2);
    vals.forEach(function(v,i){
      var x=45+i*(bw+2),barH=Math.max(2,(v/maxV)*(h-40));
      var bh=(h-20-barH);
      ctx.fillStyle='#ff4757';ctx.fillRect(x,bh,bw,barH);
    });
    // avg line
    var avg=vals.reduce(function(s,v){return s+v;},0)/vals.length;
    var ay=20+(h-40)*(1-avg/maxV);
    ctx.strokeStyle='var(--gold)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(40,ay);ctx.lineTo(w-10,ay);ctx.stroke();
    ctx.setLineDash([]);
  },100);
  return h;
}

function buildYearReport(){
  var months={},totalM=Math.min(12,Math.ceil(G.day/30));
  for(var m=0;m<totalM;m++){
    var startD=m*30+1,endD=Math.min((m+1)*30,G.day);
    var rev=0,sold=0;
    for(var d=startD;d<=endD;d++){
      var rec=G.allDailyRecords[d];
      if(rec){rev+=rec.revenue||0;var it=rec.sales||[];it.forEach(function(l){sold+=safenum(l.sold);});}
    }
    months[m]={rev:rev,sold:sold};
  }
  var maxR=Math.max.apply(null,Object.values(months).map(function(m){return m.rev;}),1);
  var h='<div style="background:var(--card);border-radius:8px;padding:8px;margin:8px 0"><canvas id="rYrChart" width="550" height="180" style="max-width:100%"></canvas></div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:10px"><tr style="color:var(--accent)"><td>月份</td><td>月营收</td><td>销量</td></tr>';
  for(var m=0;m<totalM;m++){
    var dt=dayToDate(m*30+1);
    h+='<tr style="border-bottom:1px solid var(--border)"><td>第'+dt.year+'年'+dt.month+'月</td><td style="color:var(--gold)">¥'+fmt(months[m].rev)+'</td><td>'+fmt(months[m].sold)+'件</td></tr>';
  }
  h+='</table>';
  setTimeout(function(){
    var cy=document.getElementById('rYrChart');if(!cy)return;
    var ctx=cy.getContext('2d'),w=cy.width,h=cy.height;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='#636e72';ctx.font='8px "Microsoft YaHei"';ctx.textAlign='right';
    for(var i=0;i<=4;i++){
      var yv=Math.round(maxR*(4-i)/4);
      var yy=20+(h-40)*(i/4);
      ctx.fillText('¥'+fmt(yv),35,yy+4);
      ctx.strokeStyle='#1c2530';ctx.beginPath();ctx.moveTo(40,yy);ctx.lineTo(w-10,yy);ctx.stroke();
    }
    var bw=Math.max(10,(w-50)/totalM-4);
    for(var m=0;m<totalM;m++){
      var x=45+m*(bw+4),barH=Math.max(2,(months[m].rev/maxR)*(h-40));
      ctx.fillStyle='#ff4757';ctx.fillRect(x,h-20-barH,bw,barH);
      ctx.fillStyle='#636e72';ctx.font='7px "Microsoft YaHei"';ctx.textAlign='center';
      ctx.fillText(''+(m+1)+'月',x+bw/2,h-5);
    }
  },100);
  return h;
}

function calcNetWorth(){
  var stockVal=G.inventory.reduce(function(s,i){return s+safenum(i.stock)*safenum(i.price);},0);
  return G.money+stockVal-G.loan;
}

// ============ 仪表盘 ============
function drawGauges(){
  drawGauge('gFame',G.fame,100,'#a55eea');
  drawGauge('gRep',G.reputation,100,'#1e90ff');
  drawGauge('gShare',Math.min(100,G.fame*0.3+G.reputation*0.3+totalStock()*0.5),100,'#2ed573');
  drawRevenueChart();

function drawGauge(cid,val,max,c){
  var canvas=document.getElementById(cid);if(!canvas)return;
  var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height,cx=w/2,cy=h-5,r=Math.min(cx,cy)-12,angle=Math.PI,start=-Math.PI;
  var pct=Math.min(1,val/max),end=start+angle*pct;
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();ctx.arc(cx,cy,r,start,start+angle);ctx.strokeStyle='#1c2530';ctx.lineWidth=8;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r,start,end);ctx.strokeStyle=c;ctx.lineWidth=8;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 16px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText(Math.round(val),cx,cy-5);
  ctx.font='8px "Microsoft YaHei"';ctx.fillStyle='#636e72';ctx.fillText('/'+max,cx+14,cy+5);
}
function drawRevenueChart(){
  var canvas=document.getElementById('chartRev');if(!canvas)return;
  var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  var hist=G.revenueHistory.slice(-30),max=Math.max.apply(null,hist.concat([1]));
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#1c2530';ctx.lineWidth=0.5;
  for(var i=0;i<=3;i++){
    var y=10+(h-18)*(i/3);
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();
    ctx.fillStyle='#636e72';ctx.font='7px "Microsoft YaHei"';
    ctx.fillText('¥'+Math.round(max*(3-i)/3),2,y+8);
  }
  if(hist.length<2)return;
  ctx.beginPath();ctx.strokeStyle='#2ed573';ctx.lineWidth=1.5;
  hist.forEach(function(v,i){
    var x=2+i*((w-4)/(Math.max(hist.length-1,1)));
    var y=10+(h-18)*(1-v/max);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
}

// ============ 核心：下一天 ============
function nextDay(){
  if(!G.running)return;
  G.day++;G.dailyRevenue=0;G.dailyCost=0;G.dailySoldCount=0;G.dailyBoughtCount=0;G.dailyLog=[];
  // 解锁新商品和对手
  PRODUCTS.forEach(function(p){
    if(!G.productsUnlocked.includes(p)&&G.level>=p.tier*2){
      G.productsUnlocked.push(p);G.talentPoints++;
      addLog('🔓 解锁 '+p.emoji+' '+p.name+' +1天赋点','good');
    }
  });
  G.rivals.forEach(function(r){if(G.day>=r.unlock)r.power=Math.max(10,r.power+Math.floor(Math.random()*5-2));});
  // 每5天+1天赋点
  if(G.day%5===0){G.talentPoints++;addLog('📅 周期奖励 +1天赋点','warn');}
  // 每日成本
  var empSal=G.employees.reduce(function(s,e){return s+safenum(e.salary);},0);
  G.money-=empSal;
  // 贷款利息
  if(G.loan>0){
    var interest=Math.round(G.loan*G.loanInterestRate);
    G.money-=interest;G.loanDaysLeft--;
    if(G.loanDaysLeft<=0||G.money<=-5000){G.money-=G.loan;G.loan=0;G.loanDaysLeft=0;addLog('🏦 贷款到期自动还本付息','warn');}
  }
  // 随机事件
  if(Math.random()<0.2&&G.day>3){
    var ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
    var dur=1+Math.floor(Math.random()*2);
    G.activeEvents.push({eff:ev.eff,v:ev.v,name:ev.t,remainingDays:dur,type:ev.type});
    addLog(ev.t+'（持续'+dur+'天）',ev.type==='good'?'good':'bad');
  }
  // 市场波动
  PRODUCTS.filter(function(p){return G.productsUnlocked.includes(p);}).forEach(function(p){
    var ae=G.employees.filter(function(e){return e.eff==='analyst'||e.eff==='all';}).length;
    var change=(Math.random()-0.5)*0.12+ae*0.01;
    var cur=G.marketPrices[p.id]||p.bc,newP=Math.round(cur*(1+change));
    newP=Math.max(p.bc*0.7,Math.min(p.bc*1.5,newP));
    G.marketPrices[p.id]=newP;
    G.priceHistory[p.id].push(newP);
    if(G.priceHistory[p.id].length>45)G.priceHistory[p.id].shift();
  });
  // Buff过期
  G.activeBuffs=G.activeBuffs.filter(function(b){b.remainingDays--;return b.remainingDays>0;});
  G.activeEvents=G.activeEvents.filter(function(e){e.remainingDays--;return e.remainingDays>0;});
  // 每日销售
  var repBonus=G.employees.filter(function(e){return e.eff==='rep';}).reduce(function(s,e){return s+safenum(e.val);},0);
  G.reputation=Math.max(0,Math.min(100,G.reputation+repBonus*0.2));
  var baseTraffic=1+(G.talents['perm_traffic']||0)*0.2;
  var mktBuff=G.activeBuffs.filter(function(b){return b.eff==='traffic';}).reduce(function(s,b){return s*b.v;},1);
  var evBuff=G.activeEvents.filter(function(e){return e.eff==='traffic';}).reduce(function(s,e){return s*e.v;},1);
  var trafficMult=baseTraffic*mktBuff*evBuff;
  var loyalty=0.05+(G.talents['perm_loyalty']||0)*0.05;
  var boosted=[];
  G.inventory.forEach(function(item){
    var p=PRODUCTS.find(function(x){return x.id===item.productId;});
    if(!p)return;
    var baseSold=Math.floor(trafficMult*(3+Math.random()*7));
    var salesInc=G.employees.filter(function(e){return e.eff==='sales'||e.eff==='all';}).reduce(function(s,e){return s+safenum(e.val);},0);
    baseSold=Math.floor(baseSold*(1+salesInc));
    var sold=Math.min(safenum(item.stock),baseSold);
    if(sold<=0)return;
    item.stock-=sold;
    var revenue=sold*safenum(item.price);
    G.money+=revenue;G.dailyRevenue+=revenue;G.totalRevenue+=revenue;G.totalSold+=sold;G.dailySoldCount+=sold;
    G.fame=Math.min(100,G.fame+sold*0.1);
    G.dailyLog.push({emoji:p.emoji,name:p.name,sold:sold,price:safenum(item.price)});
    boosted.push(p.id);
  });
  G.revenueHistory.push(G.dailyRevenue);
  G.fameHistory.push(G.fame);
  G.shareHistory.push(Math.round(Math.min(100,G.fame*0.3+G.reputation*0.3+totalStock()*0.5)));
  if(G.dailyRevenue>G.bestDay)G.bestDay=G.dailyRevenue;
  // GM托管
  if(G.autoMode)autoManage();
  // 清理
  G.inventory=G.inventory.filter(function(i){return safenum(i.stock)>0;});
  // 保存记录
  if(!G.allDailyRecords[G.day])G.allDailyRecords[G.day]={sales:[],revenue:0,cost:0,soldCount:0,boughtCount:0};
  G.allDailyRecords[G.day]={sales:G.dailyLog.slice(),revenue:G.dailyRevenue,cost:G.dailyCost,soldCount:G.dailySoldCount,boughtCount:G.dailyBoughtCount};
  // 补货计划自动触发
  autoRestock();
  render();
  if(G.money<-5000){G.running=false;openModal('<h3>💸 破产！</h3><div style="text-align:center;padding:20px;color:var(--accent)">资金耗尽，游戏结束。累计营收 ¥'+fmt(G.totalRevenue)+'</div><button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>');}
}

function autoManage(){
  if(G.talentPoints>0){
    TALENTS.forEach(function(t){var cur=G.talents[t.eff]||0;while(G.talentPoints>=t.cost&&cur<t.max){G.talentPoints-=t.cost;G.talents[t.eff]=cur+1;cur++;addLog('自动升级天赋: '+t.name,'info');}});
  }
  var hasGM=G.employees.some(function(e){return e.eff==='gm';});
  var threshold=hasGM?10:5,maxQty=hasGM?8:3;
  var stkAvail=baseStock()-totalStock();
  PRODUCTS.filter(function(p){return G.productsUnlocked.includes(p);}).sort(function(a,b){return (G.marketPrices[a.id]||a.bc)-(G.marketPrices[b.id]||b.bc);}).forEach(function(p){
    var price=safenum(G.marketPrices[p.id]||p.bc),inv=G.inventory.find(function(i){return i.productId===p.id;}),curStk=inv?safenum(inv.stock):0;
    if(curStk>=threshold||stkAvail<=0||G.money<price*2)return;
    var qty=Math.min(maxQty,Math.floor(safenum(G.money)*0.25/price),Math.max(1,stkAvail));
    if(qty<=0)return;
    var total=qty*price;G.money-=total;G.dailyCost+=total;G.dailyBoughtCount+=qty;
    var sp=sellPrice(p.id);
    if(inv){
      inv.stock+=qty;inv.cost=price;inv.price=sp;
      if(!inv.purchaseLog)inv.purchaseLog=[];
      inv.purchaseLog.push({qty:qty,price:price,day:G.day});
    }else{
      G.inventory.push({productId:p.id,name:p.name,stock:qty,cost:price,price:sp,purchaseLog:[{qty:qty,price:price,day:G.day}]});
    }
    addLog('自动进货 '+p.name+' x'+qty+' -¥'+fmt(total),'info');
  });
  if(hasGM){
    var activeCamps=G.activeBuffs.filter(function(b){return b.eff==='traffic';});
    if(activeCamps.length===0&&G.money>3000&&G.fame>10&&G.day%3===0){
      var mkts=[{id:'social',cost:200,mult:1.5},{id:'search',cost:500,mult:2.0},{id:'live',cost:1200,mult:3.0}];
      var pick=mkts[Math.min(mkts.length-1,Math.floor(G.money/5000))];
      var disc=1-(G.talents['perm_mkt_disc']||0)*0.15;
      var c=Math.round(pick.cost*disc);
      if(G.money>c+1000){G.money-=c;G.activeBuffs.push({eff:'traffic',v:pick.mult,name:pick.id,remainingDays:1,type:'good'});addLog('总经理投放'+pick.name+' -¥'+c,'info');}
    }
    if(G.fame>60&&G.globalMarkup<2.8){G.globalMarkup=Math.min(2.8,G.globalMarkup+0.05);G.inventory.forEach(function(i){i.price=sellPrice(i.productId);});}
    else if(G.fame<25&&G.globalMarkup>1.3){G.globalMarkup=Math.max(1.3,G.globalMarkup-0.05);G.inventory.forEach(function(i){i.price=sellPrice(i.productId);});}
    if(G.money<800&&G.loan===0&&G.reputation>45){
      G.loan=Math.min(20000,Math.floor(G.reputation*200));G.loanDaysLeft=30;G.money+=G.loan;
      addLog('总经理贷款 +¥'+fmt(G.loan),'warn');
    }
    if(totalStock()>=baseStock()*0.8&&G.money>2000&&(G.storageExpanded||0)<10){
      G.money-=800;G.storageExpanded=(G.storageExpanded||0)+1;
      addLog('总经理扩容 +10格 -¥800','info');
    }
    if(G.employees.length<4&&G.money>3000&&G.day%5===0){
      var avail=EMPLOYEES.filter(function(e){return G.money>e.cost+1000&&!G.employees.some(function(em){return em.eff===e.eff&&(e.type==='executive'||e.type==='senior');});});
      if(avail.length>0){
        var pick=avail[Math.floor(Math.random()*avail.length)];
        G.money-=pick.cost;
        G.employees.push({id:pick.id,name:pick.name,eff:pick.eff,val:safenum(pick.val),salary:safenum(pick.sal)});
        addLog('总经理招聘 '+pick.name,'good');
      }
    }
  }
}

function autoRestock(){
  if(!G.restockPlan)return;
  Object.entries(G.restockPlan).forEach(function(e){
    var pid=e[0],plan=e[1];
    if(!plan.enabled)return;
    var inv=G.inventory.find(function(i){return i.productId===pid;});
    var curStk=inv?safenum(inv.stock):0;
    if(curStk>=plan.threshold)return;
    var price=safenum(G.marketPrices[pid]||bpOf(pid));
    var need=Math.min(plan.qty,safenum(baseStock())-totalStock());
    if(need<=0||G.money<price*need)return;
    var total=price*need;G.money-=total;G.dailyCost+=total;G.dailyBoughtCount+=need;
    if(inv){
      inv.stock+=need;inv.cost=price;
      if(!inv.purchaseLog)inv.purchaseLog=[];
      inv.purchaseLog.push({qty:need,price:price,day:G.day});
    }else{
      G.inventory.push({productId:pid,name:nameOf(pid),stock:need,cost:price,price:sellPrice(pid),purchaseLog:[{qty:need,price:price,day:G.day}]});
    }
    addLog('自动补货 '+nameOf(pid)+' x'+need+' -¥'+fmt(total),'info');
  });
}

// ============ 买/卖 ============
function sellPrice(pid){
  var p=PRODUCTS.find(function(x){return x.id===pid;});if(!p)return 0;
  var design=(G.employees.some(function(e){return e.eff==='design'||e.eff==='all';}))?0.1:0;
  var brand=(G.talents['perm_price']||0)*0.15;
  return Math.round(safenum(p.bp)*G.globalMarkup*(1+design+brand));
}

function showBuy(pid){
  var p=PRODUCTS.find(function(x){return x.id===pid;});if(!p)return;
  var price=safenum(G.marketPrices[p.id]||p.bc);

  var h='<h3>'+p.emoji+' '+p.name+'</h3><div style="font-size:12px;margin:6px 0">进货价: <b style="color:var(--gold);font-size:16px">¥'+price+'</b> | 现货上限: '+stkAvail+'件 | 资金: ¥'+fmt(G.money)+'</div><div style="margin:10px 0"><label>数量: </label><input type="number" min="1" max="'+maxBuy+'" value="1" id="buyQty" style="width:80px" onchange="if(this.value<1)this.value=1;if(this.value>'+maxBuy+')this.value='+maxBuy+';document.getElementById(\'buyTotal\').textContent=\'总价: ¥\'+('+price+'*this.value).toLocaleString()"></div><div style="font-size:12px;margin:8px 0;color:var(--gold)" id="buyTotal">总价: ¥'+fmt(price)+'</div><div style="display:flex;gap:6px"><button class="btn primary" onclick="doBuy(\''+pid+'\','+price+')" style="flex:1;padding:8px">进货</button><button class="btn ghost" onclick="closeModal()" style="flex:1;padding:8px">取消</button></div>';

function doBuy(pid,price){
  var qtyEl=document.getElementById('buyQty'),qty=qtyEl?parseInt(qtyEl.value)||1:1;

  var stkAvail=baseStock()-totalStock();if(qty>stkAvail){qty=stkAvail;total=qty*safenum(price);}
  if(qty<=0){render();return;}
  G.money-=total;
  G.dailyCost+=total;G.dailyBoughtCount+=qty;
  var exist=G.inventory.find(function(i){return i.productId===pid;});
  var sp=sellPrice(pid);
  if(exist){
    exist.stock+=qty;exist.cost=safenum(price);exist.price=safenum(sp);
    if(!exist.purchaseLog)exist.purchaseLog=[];
    exist.purchaseLog.push({qty:qty,price:safenum(price),day:G.day});
  }else{
    G.inventory.push({productId:pid,name:nameOf(pid),stock:qty,cost:safenum(price),price:safenum(sp),purchaseLog:[{qty:qty,price:safenum(price),day:G.day}]});
  }
  G.supplierFavor[pid]=(G.supplierFavor[pid]||0)+qty*0.5;
  addLog('进货 '+nameOf(pid)+' x'+qty+' -¥'+fmt(total),'info');
  render();
}

// ============ 利润率弹窗 ============
function showMarkupModal(){

function toggleRestock(pid){

  }

  h+='<div style="font-size:28px;font-weight:bold;color:var(--gold);text-align:center">'+val+'</div>';

  h+='<div style="font-size:10px;color:var(--text2);margin:4px 0">说明:</div>';
  h+='<div style="font-size:11px">'+desc+'</div>';

      var range=max-min||1;
      ctx.clearRect(0,0,w,hh);
      ctx.strokeStyle='#1c2530';ctx.lineWidth=0.5;ctx.fillStyle='#636e72';ctx.font='8px "Microsoft YaHei"';ctx.textAlign='right';
      for(var i=0;i<=4;i++){
        var y=10+(hh-30)*(i/4);
        ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(w-10,y);ctx.stroke();
        ctx.fillText(Math.round(max-(range*i/4)),35,y+4);
      }
      ctx.beginPath();ctx.strokeStyle='#a55eea';ctx.lineWidth=2;
      hist.forEach(function(v,i){
        var x=45+i*((w-60)/(Math.max(hist.length-1,1)));
        var py=10+(hh-30)*(1-(v-min)/range);
        if(i===0)ctx.moveTo(x,py);else ctx.lineTo(x,py);
      });
      ctx.stroke();
    },80);
  }
}
function showBigChart(){
  render();
  var h='<h3>📉 营收趋势</h3><div style="background:var(--card);border-radius:8px;padding:8px;margin:8px 0"><canvas id="bigChart" width="580" height="250" style="max-width:100%"></canvas></div><button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>';
  openModal(h,'large');
  setTimeout(function(){
    var bc=document.getElementById('bigChart');if(!bc)return;
    var ctx=bc.getContext('2d'),w=bc.width,h=bc.height,hist=G.revenueHistory.slice(-60),max=Math.max.apply(null,hist.concat([1]));
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle='#1c2530';ctx.lineWidth=0.5;
    for(var i=0;i<=4;i++){
      var y=30+(h-50)*(i/4);
      ctx.beginPath();ctx.moveTo(50,y);ctx.lineTo(w-20,y);ctx.stroke();
      ctx.fillStyle='#636e72';ctx.font='9px "Microsoft YaHei"';ctx.textAlign='right';
      ctx.fillText('¥'+Math.round(max*(4-i)/4),45,y+4);
    }
    if(hist.length<2)return;
    ctx.beginPath();ctx.strokeStyle='#2ed573';ctx.lineWidth=2;
    hist.forEach(function(v,i){
      var x=55+i*((w-80)/(Math.max(hist.length-1,1)));
      var y=30+(h-50)*(1-v/max);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.stroke();
    // avg
    var avg=hist.reduce(function(s,v){return s+v;},0)/hist.length;
    var ay=30+(h-50)*(1-avg/max);
    ctx.strokeStyle='#f9ca24';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(50,ay);ctx.lineTo(w-20,ay);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#f9ca24';ctx.font='9px "Microsoft YaHei"';
    ctx.fillText('均值 ¥'+fmt(Math.round(avg)),w-80,ay-5);
  },100);
}

// ============ 日历查看 ============
function showDayByCalendar(d){
  var rec=G.allDailyRecords[d];
  if(!rec||!rec.sales||rec.sales.length===0){
    openModal('<h3>📅 '+dateStr(d)+' 无销售记录</h3><button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>');
    return;
  }
  var total=rec.sales.reduce(function(s,l){return s+safenum(l.sold)*safenum(l.price);},0);
  var h='<h3>📅 '+dateStr(d)+' 售出明细</h3>';
  if(!rec.sales||rec.sales.length===0){
    h+='<div style="color:var(--text2);text-align:center;padding:20px">当日无销售记录</div>';
  }else{
    h+='<div style="font-size:9px;color:var(--text2);margin-bottom:6px">共 '+rec.sales.length+' 种商品</div>';
    rec.sales.forEach(function(l){h+='<div class="info-row"><span>'+safenum(l.emoji||'')+' '+safenum(l.name||'')+'</span><span style="font-size:9px">'+safenum(l.sold)+'件 × ¥'+fmt(safenum(l.price))+' = <b style="color:var(--gold)">¥'+fmt(safenum(l.sold)*safenum(l.price))+'</b></span></div>';});
    h+='<div style="text-align:right;margin-top:8px;font-size:14px;color:var(--gold);font-weight:bold">当日总售出: ¥'+fmt(total)+'</div>';
  }
  h+='<button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>';
  openModal(h);
}

// ============ 初始化 ============
function init(){
  initRivals();initMarket();
  document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();nextDay();}});
  render();
}
init();
</script>
