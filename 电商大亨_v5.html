<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>电商大亨 v5</title>
<style>
:root{--bg:#080c12;--panel:#111820;--border:#1c2530;--accent:#ff4757;--gold:#f9ca24;--green:#2ed573;--blue:#1e90ff;--purple:#a55eea;--text:#dfe6e9;--text2:#636e72;--card:#171d28;--self:#ff475722}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;touch-action:manipulation;font-size:12px}
.app{max-width:1340px;margin:0 auto;padding:8px}
.topbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;flex-wrap:wrap}
.topbar .logo{font-size:26px}
.topbar h1{font-size:14px;color:var(--accent);margin-right:auto}
.sp{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:5px 9px;min-width:70px;cursor:pointer;transition:0.2s}
.sp.clickable:hover{border-color:var(--accent)}
.sp .icon{font-size:15px}.sp .val{font-size:13px;font-weight:bold}.sp .lbl{font-size:7px;color:var(--text2)}
.day-badge{background:var(--accent);color:#fff;padding:4px 10px;border-radius:15px;font-weight:bold;font-size:11px}
.gauge-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.gauge-card{flex:1;min-width:85px;background:var(--card);border-radius:9px;padding:6px;text-align:center;cursor:pointer;transition:0.2s}
.gauge-card:hover{border:1px solid var(--accent)}
.gauge-card canvas{display:block;margin:0 auto}
.gauge-card .label{font-size:8px;color:var(--text2);margin-top:1px}
.layout{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px;overflow:hidden;cursor:pointer;transition:0.2s}
.panel:hover{border-color:rgba(255,71,87,0.3)}
.panel h3{font-size:10px;color:var(--accent);margin-bottom:5px;display:flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:1px}
.panel.w2{grid-column:span 2}.panel.w3{grid-column:span 3}.panel.w4{grid-column:span 4}
.scroll-area{overflow-y:auto;max-height:190px;scrollbar-width:thin;scrollbar-color:#1c2530 #111820}
.scroll-area::-webkit-scrollbar{width:4px}
.scroll-area::-webkit-scrollbar-track{background:#111820}
.scroll-area::-webkit-scrollbar-thumb{background:#1c2530;border-radius:2px}
.btn{padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-size:10px;font-weight:600;transition:0.2s;white-space:nowrap;touch-action:manipulation}
.btn.primary{background:var(--accent);color:#fff}.btn.primary:hover{background:#e84150}
.btn.gold{background:var(--gold);color:#111}.btn.green{background:var(--green);color:#111}
.btn.blue{background:var(--blue);color:#fff}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn.ghost:hover{background:#1c2530}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:4px}
.market-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px;cursor:pointer;transition:0.2s;text-align:center;touch-action:manipulation}
.market-card:hover,.market-card:active{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,0.3)}
.market-card .emoji{font-size:26px}.market-card .name{font-size:10px;font-weight:bold}.market-card .price{font-size:11px;color:var(--gold)}.market-card .trend{font-size:7px;padding:1px 6px;border-radius:4px;display:inline-block}.market-card .cat{font-size:7px;color:var(--text2);margin-top:1px}
.th{background:rgba(255,71,87,0.2);color:var(--accent)}.tc{background:rgba(99,110,114,0.2);color:var(--text2)}.tf{background:rgba(30,144,255,0.2);color:var(--blue)}

.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px}
.inv-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px;cursor:pointer;transition:0.2s;position:relative;touch-action:manipulation}
.inv-card:hover{border-color:var(--accent)}
.inv-card .emoji{font-size:24px}.inv-card .name{font-size:11px;font-weight:bold}.inv-card .detail{font-size:9px;color:var(--text2)}.inv-card .stkbar{height:3px;background:#1c2530;border-radius:2px;margin:3px 0}
.inv-card .stkfill{height:100%;background:var(--green);border-radius:2px}
.inv-card .qbtn{position:absolute;top:5px;right:5px;background:var(--accent);color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:9px;cursor:pointer;font-weight:bold;touch-action:manipulation}
.inv-card .qbtn:hover{background:#e84150}
.info-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);padding:5px 7px;border-radius:5px;margin:2px 0;font-size:10px;gap:5px}
.info-row.self{background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.4);font-weight:bold}
.info-row.self .rank-badge{background:var(--accent);color:#fff;padding:0px 6px;border-radius:4px;font-size:8px;margin-right:4px}
.mkt-btn{display:block;width:100%;text-align:left;padding:7px 9px;margin:3px 0;background:var(--card);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:10px;color:var(--text);transition:0.2s;touch-action:manipulation}
.mkt-btn:active,.mkt-btn:hover{border-color:var(--accent);background:#1c2530}
.mkt-btn .cost{float:right;color:var(--gold)}
.log-list{max-height:220px;overflow-y:auto;font-size:9px;line-height:1.8;scrollbar-width:thin;scrollbar-color:#1c2530 #111820}
.log-list::-webkit-scrollbar{width:3px}
.log-list::-webkit-scrollbar-thumb{background:#1c2530;border-radius:2px}
.log-list .log{padding:1px 0;border-bottom:1px solid rgba(28,37,48,0.4);display:flex;gap:3px}
.log .dt{color:var(--text2);min-width:28px;flex-shrink:0;font-size:8px}
.log.good{color:var(--green)}.log.bad{color:var(--accent)}.log.info{color:var(--blue)}.log.warn{color:var(--gold)}.log.neutral{color:var(--purple)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:1000;justify-content:center;align-items:center;padding:10px}
.modal-overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;max-width:500px;width:94%;max-height:85vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#1c2530 #111820}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:#1c2530;border-radius:2px}
.modal.large{max-width:720px}
.modal h3{color:var(--accent);margin-bottom:6px;font-size:14px}
.modal input[type=range]{width:100%;height:28px;accent-color:var(--accent);cursor:pointer;margin:4px 0}
.modal input[type=number]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px;border-radius:5px;width:80px;font-size:13px}
.modal input[type=number].wide{width:100%}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:7px;margin:1px}
.buff-tag{padding:2px 6px;border-radius:4px;font-size:8px;display:inline-block;margin:1px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,0.4)}50%{box-shadow:0 0 0 8px rgba(255,71,87,0)}}.pulse{animation:pulse 2s infinite}
.loan-badge{background:var(--accent);color:#fff;padding:2px 7px;border-radius:7px;font-size:9px;animation:pulse 2s infinite;cursor:pointer}
.day-sale{font-size:9px;color:var(--text2);margin-top:2px;line-height:1.4;min-height:16px}
.mini-chart canvas{display:block;margin:0 auto}
.rank-table{width:100%;border-collapse:collapse;font-size:10px}
.rank-table td,.rank-table th{padding:4px 6px;border-bottom:1px solid var(--border);text-align:left}
.rank-table .rnk{width:30px;text-align:center;font-weight:bold}
.rank-table .my-row{background:rgba(255,71,87,0.15);font-weight:bold}
.rank-table .my-row td{border-bottom:2px solid var(--accent)}
.buff-list{font-size:9px;line-height:1.8;margin-top:6px}
.buff-list .b-line{padding:2px 6px;margin:1px 0;background:var(--card);border-radius:4px;font-size:9px}
@media(max-width:900px){.layout{grid-template-columns:1fr 1fr}.panel.w2,.panel.w3,.panel.w4{grid-column:span 2}.gauge-card{flex:1 1 45%;min-width:120px}.market-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}.inv-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}.modal{max-width:95%;padding:10px}.scroll-area{max-height:160px}}
@media(max-width:550px){.layout{grid-template-columns:1fr}.panel.w2,.panel.w3,.panel.w4{grid-column:span 1}.gauge-card{flex:1 1 44%;min-width:100px}.market-grid{grid-template-columns:repeat(2,1fr)}.inv-grid{grid-template-columns:repeat(2,1fr)}.panel{padding:6px}.panel h3{font-size:9px}.modal{max-width:98%;padding:8px}.modal input[type=range]{height:34px}.btn{font-size:8px;padding:3px 7px}.scroll-area{max-height:140px}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <span class="logo">🏪</span><h1>电商大亨</h1>

  <div class="sp clickable" onclick="showNetWorth()"><span class="icon">💼</span><div><div class="val" style="color:var(--blue)" id="netWorth">¥50000</div><div class="lbl">总资产</div></div></div>
  <div id="loanStatus"></div>
  <button class="btn primary pulse" onclick="nextDay()">▶ 推进一天</button>

<div class="gauge-row">

  <div class="gauge-card" onclick="showGaugeDetail('rep')"><canvas id="gRep" width="90" height="62"></canvas><div class="label">💎 信誉</div></div>
  <div class="gauge-card" onclick="showGaugeDetail('share')"><canvas id="gShare" width="90" height="62"></canvas><div class="label">📈 份额</div></div>
  <div class="gauge-card" style="flex:2.5;min-width:180px" onclick="showBigChart()"><canvas id="chartRev" width="320" height="62"></canvas><div class="label">📉 营收趋势（点击放大）</div></div>
</div>
<div class="layout">
  <div class="panel w3" onclick="showMarketDetail()"><h3>📦 进货市场 <span style="color:var(--text2);font-weight:normal;letter-spacing:0">库存<span id="stkCur">0</span>/<span id="stkMax">30</span> | <span style="color:var(--gold);cursor:pointer" onclick="event.stopPropagation();batchPrice()">利润率<span id="mkpDisp">1.8x</span> ✎</span></span></h3><div class="scroll-area" id="marketScroll"><div class="market-grid" id="market"></div></div><div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap"><button class="btn ghost" onclick="event.stopPropagation();showLoan()" style="font-size:8px">🏦 贷款</button><button class="btn ghost" onclick="event.stopPropagation();expandStorage()" style="font-size:8px">📦 扩容 ¥800(+10格)</button></div></div>
  <div class="panel" onclick="showCalendarDetail()"><h3>📅 促销日历</h3><div id="calendar" style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-size:7px"></div><div style="font-size:7px;color:var(--text2);margin-top:2px">🔴大促 | 🇨🇳今天 | 按月自动更新</div></div>
  <div class="panel w3" onclick="showInventoryDetail()"><h3>🏬 我的店铺</h3><div class="scroll-area" id="invScroll"><div class="inv-grid" id="inventory"></div></div><div class="day-sale" id="daySaleDetail"></div></div>
  <div class="panel" onclick="showMktDetail()"><h3>📢 营销 <small style="color:var(--text2);font-weight:normal;letter-spacing:0">按天计费</small></h3><div id="mktPanel"></div><div id="buffs" style="font-size:7px;margin-top:4px"></div></div>
  <div class="panel" onclick="showRivalDetail()"><h3>⚔️ 排名 <small style="color:var(--text2);font-weight:normal;letter-spacing:0" id="rivalCount">13家</small></h3><div class="scroll-area" id="rivals"></div></div>
  <div class="panel" onclick="showEmpDetail()"><h3>👥 团队 <small id="empInfo" style="color:var(--text2);font-weight:normal;letter-spacing:0">详情</small></h3><div class="scroll-area"><div id="employees"></div></div><button class="btn ghost" onclick="event.stopPropagation();showHire()" style="width:100%;margin-top:3px;font-size:8px">➕ 招聘</button></div>
  <div class="panel" onclick="showTalentDetail()"><h3>🔮 天赋 <span style="color:var(--gold);font-weight:normal;letter-spacing:0">点:<span id="tp">0</span></span></h3><div id="talents"></div></div>
  <div class="panel" onclick="showLogDetail()"><h3>📋 经营日志</h3><div class="log-list" id="log"></div></div>
</div>
<div class="modal-overlay" id="mo"><div class="modal" id="mc"></div></div>
</div>

// ============ 辅助函数 ============
function safenum(v,fallback){return(typeof v==='number'&&isFinite(v))?v:(fallback||0);}
function fmt(v){return safenum(v,0).toLocaleString();}
function emojiOf(pid){let p=PRODUCTS.find(x=>x.id===pid);return p?p.emoji:'📦';}
function nameOf(pid){let p=PRODUCTS.find(x=>x.id===pid);return p?p.name:pid;}
function bpOf(pid){let p=PRODUCTS.find(x=>x.id===pid);return p?p.bp:100;}

function initRivals(){
  G.rivals=[];
  for(let i=0;i<12;i++)G.rivals.push({name:RIVAL_NAMES[i],power:5+Math.floor(Math.random()*10)});
}

function refreshMarket(){
  PRODUCTS.filter(p=>G.productsUnlocked.includes(p)).forEach(p=>{
    let aB=(G.talents['perm_cost']||0)*0.1;
    let ae=G.employees.filter(e=>e.eff==='analyst'||e.eff==='all').length;
    let sf=G.supplierFavor[p.id]||0;
    let mult=0.75+Math.random()*0.5-ae*0.04-sf*0.01;
    let cd=G.activeEvents.some(e=>e.eff==='cost')?G.activeEvents.find(e=>e.eff==='cost').v:1;
    let cu=G.activeEvents.some(e=>e.eff==='cost_up')?G.activeEvents.find(e=>e.eff==='cost_up').v:1;
    G.marketPrices[p.id]=Math.round(safenum(p.bc)*Math.max(0.5,mult)*(1-aB)*cd*cu);
    if(!G.priceHistory[p.id])G.priceHistory[p.id]=[];
    G.priceHistory[p.id].push(G.marketPrices[p.id]);
    if(G.priceHistory[p.id].length>45)G.priceHistory[p.id].shift();
  });
  if(G.activeEvents.some(e=>e.eff==='market')){
    let m=G.activeEvents.find(e=>e.eff==='market').v;
    Object.keys(G.marketPrices).forEach(k=>{if(G.marketPrices[k]!=null)G.marketPrices[k]=Math.round(safenum(G.marketPrices[k])*m);});
  }
}
function initMarket(){refreshMarket();}

function baseStock(){
  let s=30+(G.talents['perm_stock']||0)*10+G.storageExpanded*10;
  G.employees.forEach(e=>{
    if(e.eff==='stock')s+=safenum(e.val);
    if(e.eff==='all')s+=10;
  });
  return s;
}
function totalStock(){return G.inventory.reduce((s,i)=>s+safenum(i.stock),0);}

function calcLevel(){
  let th=[0,5000,15000,35000,70000,120000,200000,320000,500000,750000,1000000];
  for(let i=th.length-1;i>=0;i--){if(G.totalRevenue>=th[i])return i+1;}
  return 1;
}

function unlockProducts(){
  let nl=calcLevel();
  if(nl>G.level){G.level=nl;G.talentPoints++;addLog('🎊 升级 Lv.'+G.level+'！+1天赋点','warn');}
  PRODUCTS.forEach(p=>{
    if(p.tier<=Math.min(nl+1,4)&&!G.productsUnlocked.includes(p)){
      G.productsUnlocked.push(p);G.talentPoints++;
      addLog('🔓 解锁 '+p.emoji+' '+p.name+'！+1天赋点','good');
    }
  });
}

// ============ 进货均价追踪 ============
function getAvgCost(pid){
  if(!G.inventory)return 0;
  let items=G.inventory.filter(i=>i.productId===pid&&i.purchaseLog&&i.purchaseLog.length>0);
  if(items.length===0)return G.marketPrices[pid]||safenum(bpOf(pid));
  let allLogs=items.flatMap(i=>i.purchaseLog||[]),totalQty=0,totalSpent=0;
  allLogs.forEach(l=>{totalQty+=safenum(l.qty);totalSpent+=safenum(l.qty)*safenum(l.price);});
  return totalQty>0?Math.round(totalSpent/totalQty):(G.marketPrices[pid]||safenum(bpOf(pid)));
}

function getTotalCost(pid){
  let items=G.inventory.filter(i=>i.productId===pid),total=0;
  items.forEach(i=>{let avg=getAvgCost(pid);total+=safenum(i.stock)*safenum(avg);});
  return Math.round(total);
}

function drawGauge(cid,val,mx,c1,c2){
  let c=document.getElementById(cid);if(!c)return;let ctx=c.getContext('2d'),w=c.width,h=c.height;
  ctx.clearRect(0,0,w,h);let cx=w/2,cy=h-7,r=Math.min(cx-5,cy-5),start=Math.PI,end=0;
  let pct=Math.min(1,Math.max(0,safenum(val)/mx));
  ctx.beginPath();ctx.arc(cx,cy,r,start,end);ctx.strokeStyle='#1c2530';ctx.lineWidth=6;ctx.stroke();
  let grad=ctx.createLinearGradient(0,0,w,0);grad.addColorStop(0,c1);grad.addColorStop(1,c2);
  ctx.beginPath();ctx.arc(cx,cy,r,start,start+(end-start)*pct);ctx.strokeStyle=grad;ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 13px "Segoe UI","Microsoft YaHei"';ctx.textAlign='center';ctx.fillText(Math.round(safenum(val)),cx,cy);
  let ang=start+(end-start)*pct;ctx.beginPath();ctx.arc(cx+Math.cos(ang)*(r-3),cy+Math.sin(ang)*(r-3),2.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}

function drawRevenueChart(canvasId,data,w,h,maxDays){
  let c=document.getElementById(canvasId);if(!c)return;let ctx=c.getContext('2d');ctx.clearRect(0,0,w,h);
  let d=data.slice(-maxDays);if(d.length<2){ctx.fillStyle='#636e72';ctx.font='10px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText('推进天数后显示',w/2,h/2);return;}
  let pad={l:36,r:8,t:14,b:24},pw=w-pad.l-pad.r,ph=h-pad.t-pad.b,mxV=Math.max(...d.map(safenum),500);
  ctx.strokeStyle='#1c2530';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){let y=pad.t+ph*(i/4);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();ctx.fillStyle='#636e72';ctx.font='7px "Microsoft YaHei"';ctx.textAlign='right';ctx.fillText('¥'+Math.round(mxV*(1-i/4)),pad.l-3,y+3);}
  let bw=Math.max(4,Math.min(22,pw/d.length-2));
  d.forEach((v,i)=>{
    let sv=safenum(v),x=pad.l+i*(pw/d.length)+1,bh=(sv/mxV)*ph;
    let g=ctx.createLinearGradient(0,pad.t+ph-bh,0,pad.t+ph);
    g.addColorStop(0,'#2ed573');g.addColorStop(1,'rgba(46,213,115,0.1)');
    ctx.fillStyle=g;ctx.fillRect(x,pad.t+ph-bh,bw,bh);
    // 数值标签
    if(sv>0&&bh>10){
      ctx.fillStyle='#fff';ctx.font='bold 7px "Microsoft YaHei"';ctx.textAlign='center';
      let label=sv>=1000?'¥'+(sv/1000).toFixed(1)+'k':'¥'+sv;
      ctx.fillText(label,x+bw/2,pad.t+ph-bh-2);
    }
    if(sv===Math.max(...d.map(safenum))){ctx.fillStyle='#f9ca24';ctx.beginPath();ctx.arc(x+bw/2,pad.t+ph-bh-4,2.5,0,Math.PI*2);ctx.fill();}
  });
  let avg=d.reduce((a,b)=>a+safenum(b),0)/d.length,ay=pad.t+ph-(avg/mxV)*ph;
  ctx.strokeStyle='rgba(255,71,87,0.5)';ctx.lineWidth=1;ctx.setLineDash([2,3]);ctx.beginPath();ctx.moveTo(pad.l,ay);ctx.lineTo(w-pad.r,ay);ctx.stroke();ctx.setLineDash([]);
}

function drawMiniPriceChart(canvasId,history,w,h){
  let c=document.getElementById(canvasId);if(!c)return;let ctx=c.getContext('2d');ctx.clearRect(0,0,w,h);
  if(!history||history.length<2){ctx.fillStyle='#636e72';ctx.font='8px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText('数据不足',w/2,h/2);return;}
  let pad=5,min=Math.min(...history),max=Math.max(...history),range=max-min||1;
  let first=history[0],last=history[history.length-1];
  ctx.strokeStyle=last>=first?'#2ed573':'#ff4757';ctx.lineWidth=1.5;ctx.beginPath();
  history.forEach((v,i)=>{let x=pad+i*((w-pad*2)/(history.length-1)),y=pad+(h-pad*2)*(1-(v-min)/range);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
  ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 8px "Microsoft YaHei"';ctx.textAlign='left';
  ctx.fillText('¥'+history[history.length-1],pad,h-2);
}

}

function getMonthStart(day){
  // day 1-365, 12 months of ~30 days each
  let doy=(day-1)%365+1;
  let months=[0,31,59,90,120,151,181,212,243,273,304,334,365];
  for(let m=0;m<12;m++){
    if(doy>months[m]&&doy<=months[m+1])return months[m]+1;
  }
  return 1;
}

function getMonthEnd(day){
  let doy=(day-1)%365+1;
  let months=[0,31,59,90,120,151,181,212,243,273,304,334,365];
  for(let m=0;m<12;m++){
    if(doy>months[m]&&doy<=months[m+1])return months[m+1];
  }
  return 31;
}

}

function showPriceChart(pid){
  let p=PRODUCTS.find(x=>x.id===pid);
  if(!p){closeModal();return;}
  let hist=G.priceHistory[pid]||[],cur=safenum(G.marketPrices[pid]||p.bc);
  let h='<h3>'+p.emoji+' '+p.name+' 价格走势图</h3><div style="font-size:12px;margin:6px 0">当前: <b style="color:var(--gold);font-size:16px">¥'+cur+'</b> | 底价: <b>¥'+safenum(p.bc)+'</b> | 共'+hist.length+'个数据点</div><div style="background:var(--card);border-radius:8px;padding:8px"><canvas id="pcCanvas" width="580" height="200" style="max-width:100%"></canvas></div><button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>';
  openModal(h,'large');
  setTimeout(function(){
    let pc=document.getElementById('pcCanvas');
    if(!pc||hist.length<2)return;
    let ctx=pc.getContext('2d'),w=pc.width,h=pc.height;
    let min=Math.min(...hist),max=Math.max(...hist),range=max-min||1,pad=40;
    ctx.clearRect(0,0,w,h);
    // 网格线
    ctx.strokeStyle='#1c2530';ctx.lineWidth=0.5;
    for(let i=0;i<=4;i++){
      let y=pad+(h-pad*2)*(i/4);
      ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke();
      ctx.fillStyle='#636e72';ctx.font='9px "Microsoft YaHei"';ctx.textAlign='right';
      ctx.fillText('¥'+Math.round(max-(range*i/4)),pad-5,y+3);
    }
    // 填充区域
    ctx.beginPath();
    hist.forEach((v,i)=>{
      let x=pad+i*((w-pad*2)/(Math.max(hist.length-1,1)));
      let y=pad+(h-pad*2)*(1-(v-min)/range);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    let lastX=pad+(hist.length-1)*((w-pad*2)/(Math.max(hist.length-1,1)));
    ctx.lineTo(lastX,pad+(h-pad*2));
    ctx.lineTo(pad,pad+(h-pad*2));
    ctx.closePath();
    ctx.fillStyle='rgba(46,213,115,0.08)';ctx.fill();
    // 趋势线
    ctx.beginPath();
    hist.forEach((v,i)=>{
      let x=pad+i*((w-pad*2)/(Math.max(hist.length-1,1)));
      let y=pad+(h-pad*2)*(1-(v-min)/range);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.strokeStyle='#2ed573';ctx.lineWidth=2;ctx.stroke();
    // 数据点
    hist.forEach((v,i)=>{
      let x=pad+i*((w-pad*2)/(Math.max(hist.length-1,1)));
      let y=pad+(h-pad*2)*(1-(v-min)/range);
      ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle='#2ed573';ctx.fill();
    });
    // 最新值标注
    let lx=pad+(hist.length-1)*((w-pad*2)/(Math.max(hist.length-1,1)));
    ctx.fillStyle='#fff';ctx.font='bold 10px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText('¥'+hist[hist.length-1],lx,pad-8);
  },80);
}

function showBigChart(){
  let d=G.revenueHistory.slice(-60);
  let h='<h3>📉 营收趋势（近'+d.length+'天）</h3><div style="background:var(--card);border-radius:8px;padding:8px"><canvas id="bigChartCanvas" width="650" height="280" style="max-width:100%"></canvas></div><button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>';
  openModal(h,'large');
  setTimeout(function(){
    let c=document.getElementById('bigChartCanvas');
    if(!c||d.length<2)return;
    let ctx=c.getContext('2d'),w=c.width,h=c.height;
    let pad={l:50,r:20,t:30,b:35},pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
    let mxV=Math.max(...d.map(safenum),500);
    ctx.clearRect(0,0,w,h);
    // 网格
    ctx.strokeStyle='#1c2530';ctx.lineWidth=0.5;
    for(let i=0;i<=5;i++){
      let y=pad.t+ph*(i/5);
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
      ctx.fillStyle='#636e72';ctx.font='9px "Microsoft YaHei"';ctx.textAlign='right';
      ctx.fillText('¥'+Math.round(mxV*(1-i/5)),pad.l-5,y+3);
    }
    let bw=Math.max(5,Math.min(28,pw/d.length-2));
    d.forEach((v,i)=>{
      let sv=safenum(v),x=pad.l+i*(pw/d.length)+1,bh=(sv/mxV)*ph;
      let g=ctx.createLinearGradient(0,pad.t+ph-bh,0,pad.t+ph);
      g.addColorStop(0,'#2ed573');g.addColorStop(1,'rgba(46,213,115,0.05)');
      ctx.fillStyle=g;ctx.fillRect(x,pad.t+ph-bh,bw,bh);
      // 所有柱子数据标签
      if(sv>0&&bh>12){
        ctx.fillStyle='#fff';ctx.font='bold 8px "Microsoft YaHei"';ctx.textAlign='center';
        let label=sv>=1000?'¥'+(sv/1000).toFixed(1)+'k':'¥'+sv;
        ctx.fillText(label,x+bw/2,pad.t+ph-bh-2);
      }
    });
    // 均值线
    let avg=d.reduce((a,b)=>a+safenum(b),0)/d.length,ay=pad.t+ph-(avg/mxV)*ph;
    ctx.strokeStyle='rgba(255,71,87,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pad.l,ay);ctx.lineTo(w-pad.r,ay);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#ff4757';ctx.font='9px "Microsoft YaHei"';ctx.textAlign='left';
    ctx.fillText('均值 ¥'+Math.round(avg),w-pad.r-70,ay-4);
  },80);
}

function addLog(msg,cl){
  let l=document.getElementById('log'),t=new Date().toTimeString().slice(0,5);
  l.innerHTML='<div class="log '+cl+'"><span class="dt">'+t+'</span><span>'+msg+'</span></div>'+l.innerHTML;
}
function sellPrice(pid){
  let p=PRODUCTS.find(x=>x.id===pid);if(!p)return 0;
  let design=(G.employees.some(e=>e.eff==='design'||e.eff==='all'))?0.1:0;
  let brand=(G.talents['perm_price']||0)*0.15;
  return Math.round(safenum(p.bp)*G.globalMarkup*(1+design+brand));
}

function showBuy(pid){
  let p=PRODUCTS.find(x=>x.id===pid);if(!p)return;
  let price=safenum(G.marketPrices[p.id]||p.bc);
  let stkAvail=baseStock()-totalStock(),maxBuy=Math.min(99,Math.floor(safenum(G.money)/price),Math.max(1,stkAvail));
  if(maxBuy<=0){openModal('<h3>'+p.emoji+' '+p.name+'</h3><div style="color:var(--accent);padding:20px;text-align:center">库存已满或资金不足</div><button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>');return;}
  let h='<h3>'+p.emoji+' '+p.name+'</h3><div style="font-size:12px;margin:6px 0">进货价: <b style="color:var(--gold);font-size:16px">¥'+price+'</b> | 现货上限: '+stkAvail+'件 | 资金: ¥'+fmt(G.money)+'</div><div style="margin:10px 0"><label>数量: <b id="buyQtyLabel">1</b></label><br><input type="range" min="1" max="'+maxBuy+'" value="1" id="buyQty" style="width:100%;height:30px" oninput="document.getElementById(\'buyQtyLabel\').textContent=this.value;document.getElementById(\'buyTotal\').textContent=\'总价: ¥\'+('+price+'*this.value).toLocaleString()"></div><div style="font-size:12px;margin:8px 0;color:var(--gold)" id="buyTotal">总价: ¥'+fmt(price)+'</div><div style="display:flex;gap:6px"><button class="btn primary" onclick="doBuy(\''+pid+'\','+price+')" style="flex:1;padding:8px">进货</button><button class="btn ghost" onclick="closeModal()" style="flex:1;padding:8px">取消</button></div>';
  openModal(h);
}

function doBuy(pid,price){
  let qtyEl=document.getElementById('buyQty'),qty=qtyEl?parseInt(qtyEl.value)||1:1;
  let total=qty*safenum(price);if(safenum(G.money)<total){addLog('资金不足','bad');closeModal();render();return;}
  let stkAvail=baseStock()-totalStock();if(qty>stkAvail){qty=stkAvail;total=qty*safenum(price);}
  if(qty<=0){closeModal();return;}
  G.money-=total;
  let exist=G.inventory.find(i=>i.productId===pid);
  let sp=sellPrice(pid);
  if(exist){
    exist.stock+=qty;
    exist.cost=safenum(price);
    exist.price=safenum(sp);
    if(!exist.purchaseLog)exist.purchaseLog=[];
    exist.purchaseLog.push({qty:qty,price:safenum(price),day:G.day});
  } else {
    G.inventory.push({productId:pid,name:nameOf(pid),stock:qty,cost:safenum(price),price:safenum(sp),purchaseLog:[{qty:qty,price:safenum(price),day:G.day}]});
  }
  // 供应商好感度
  G.supplierFavor[pid]=(G.supplierFavor[pid]||0)+qty*0.5;
  addLog('进货 '+nameOf(pid)+' x'+qty+' -¥'+fmt(total),'info');
  closeModal();render();
}

function quickRestock(idx){

function batchPrice(){
  let v=parseFloat(prompt('全局利润率倍率（当前'+safenum(G.globalMarkup).toFixed(1)+'x）:','1.5'))||1.5;

// ============ 下一日 ============
function nextDay(){
  if(!G.running)return;
  // 总经理托管
  if(G.employees.some(e=>e.eff==='gm'))gmAutoManage();
  // 到期buff和事件
  G.activeBuffs=G.activeBuffs.filter(b=>{b.remainingDays--;return b.remainingDays>0;});
  G.activeEvents=G.activeEvents.filter(e=>{e.remainingDays--;return e.remainingDays>0;});
  // 随机事件
  if(Math.random()<0.35&&!G.activeEvents.some(e=>e.eff==='tax')){let ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];G.activeEvents.push({...ev,remainingDays:ev.d});addLog('⚡ '+ev.t,(ev.type||'neutral'));}
  // 员工效果
  let repBonus=G.employees.filter(e=>e.eff==='rep').reduce((s,e)=>s+safenum(e.val),0);
  G.reputation=Math.min(100,Math.max(0,G.reputation+repBonus));
  // 销售
  G.dailyRevenue=0;G.dailyLog=[];G.allDailyRecords[G.day]={sales:[],events:[],revenue:0};
  let trafficBase=10+Math.floor(safenum(G.fame)*0.5);
  let trafficMult=1+(G.talents['perm_traffic']||0)*0.2;
  let mktBuff=G.activeBuffs.filter(b=>b.eff==='traffic').reduce((s,b)=>s*b.v,1);
  let evBuff=G.activeEvents.filter(e=>e.eff==='traffic').reduce((s,e)=>s*e.v,1);
  let traffic=Math.floor(trafficBase*trafficMult*mktBuff*evBuff);
  let loyalty=0.05+(G.talents['perm_loyalty']||0)*0.05;
  G.inventory.forEach(item=>{
    let p=PRODUCTS.find(x=>x.id===item.productId);if(!p||!safenum(item.stock)||!safenum(item.price))return;
    let demand=Math.min(safenum(item.stock),Math.floor(traffic*(p.tier<=2?0.12:0.06)*(safenum(G.reputation)/50)*loyalty*10));
    if(demand<=0)return;
    let sold=Math.min(demand,safenum(item.stock));
    item.stock-=sold;
    let revenue=sold*safenum(item.price);
    G.money+=revenue;G.dailyRevenue+=revenue;G.totalRevenue+=revenue;G.totalSold+=sold;
    if(sold>0){
      G.fame=Math.min(100,safenum(G.fame)+sold*0.3);
      G.reputation=Math.min(100,safenum(G.reputation)+0.1);
      G.dailyLog.push({emoji:p.emoji,name:item.name||p.name,sold:sold,price:safenum(item.price),productId:item.productId});
    }
  });
  // 事件影响
  G.activeEvents.forEach(e=>{
    if(e.eff==='fame')G.fame=Math.min(100,Math.max(0,safenum(G.fame)+safenum(e.v)));
    if(e.eff==='rep')G.reputation=Math.min(100,Math.max(0,safenum(G.reputation)+safenum(e.v)));
    if(e.eff==='subsidy'){let sub=safenum(G.totalSold)*safenum(e.v);G.money+=sub;G.dailyRevenue+=sub;addLog('政府补贴 +¥'+fmt(sub),'good');}
    if(e.eff==='damage'){G.inventory.forEach(i=>i.stock=Math.floor(safenum(i.stock)*(1-safenum(e.v))));addLog('仓库损坏！20%库存损失','bad');}
    if(e.eff==='shipping'){let fee=G.dailyLog.reduce((s,l)=>s+safenum(l.sold),0)*safenum(e.v);G.money-=fee;G.dailyRevenue-=fee;if(fee>0)addLog('物流附加费 -¥'+fmt(fee),'bad');}
  });
  G.bestDay=Math.max(G.bestDay,G.dailyRevenue);
  G.revenueHistory.push(G.dailyRevenue);
  G.fameHistory.push(G.fame);
  // 对手成长
  G.rivals.forEach(r=>{r.power=safenum(r.power)+Math.floor(Math.random()*3);});
  if(G.day%10===0&&G.rivals.length<12){G.rivals.push({name:RIVAL_NAMES[G.rivals.length],power:10+Math.floor(Math.random()*10)});}
  // 贷款利息
  if(G.loan>0){
    let interest=Math.round(safenum(G.loan)*G.loanInterestRate);
    G.money-=interest;G.loanDaysLeft--;
    if(G.loanDaysLeft<=0){addLog('贷款到期！自动还本金 ¥'+fmt(G.loan),'bad');G.money-=G.loan;if(G.money<0)G.money=0;G.loan=0;G.loanDaysLeft=0;}
    else addLog('贷款利息 -¥'+fmt(interest)+' ('+G.loanDaysLeft+'天后到期)','warn');
  }
  // 破产检测
  if(G.money<=0&&G.loan<=0){
    G.running=false;addLog('💀 破产了！资金耗尽……点击贷款可复活','bad');
    stopAuto();
    if(confirm('破产了！要申请紧急贷款 ¥5000 复活吗？')){G.loan=5000;G.loanDaysLeft=30;G.money=5000;G.running=true;addLog('紧急贷款 ¥5000！活过来了','warn');}
  }
  G.day++;unlockProducts();refreshMarket();
  // 自动清理无效库存
  G.inventory=G.inventory.filter(i=>safenum(i.stock)>0);
  render();
  // 成就
  ACHIEVEMENTS.forEach(a=>{if(!G.achievements.has(a.id)&&a.c(G)){G.achievements.add(a.id);addLog('🏅 成就解锁: '+a.name,'warn');}});
}

function gmAutoManage(){
  if(G.talentPoints>0){
    TALENTS.forEach(t=>{let cur=G.talents[t.eff]||0;while(G.talentPoints>=t.cost&&cur<t.max){G.talentPoints-=t.cost;G.talents[t.eff]=(cur||0)+1;cur++;}});
  }
  let stkAvail=baseStock()-totalStock();
  if(stkAvail>5&&G.money>1000){
    PRODUCTS.filter(p=>G.productsUnlocked.includes(p)).sort((a,b)=>(G.marketPrices[a.id]||a.bc)-(G.marketPrices[b.id]||b.bc)).slice(0,3).forEach(p=>{
      let price=safenum(G.marketPrices[p.id]||p.bc);
      let buyQ=Math.min(5,stkAvail,Math.floor(safenum(G.money)/price/3));
      if(buyQ<=0)return;
      let total=buyQ*price;G.money-=total;stkAvail-=buyQ;
      let sp=sellPrice(p.id);
      let exist=G.inventory.find(i=>i.productId===p.id);
      if(exist){
        exist.stock+=buyQ;exist.cost=safenum(price);exist.price=safenum(sp);
        if(!exist.purchaseLog)exist.purchaseLog=[];
        exist.purchaseLog.push({qty:buyQ,price:price,day:G.day});
      } else {
        G.inventory.push({productId:p.id,name:p.name,stock:buyQ,cost:safenum(price),price:safenum(sp),purchaseLog:[{qty:buyQ,price:price,day:G.day}]});
      }
    });
  }
}

  h+='<div>📦 库存: <b>'+totalStock()+'</b>/'+baseStock()+' 件</div>';
  h+='<div>💼 净资产: <b style="color:var(--gold)">¥'+fmt(nw)+'</b></div>';
  h+='<div>📊 累计营收: <b style="color:var(--green)">¥'+fmt(G.totalRevenue)+'</b></div>';
  h+='<div>🎯 总销量: <b>'+fmt(G.totalSold)+'件</b></div>';
  h+='<div>🏆 最高日收: <b style="color:var(--gold)">¥'+fmt(G.bestDay)+'</b></div>';
  h+='<div>👥 员工: <b>'+G.employees.length+'人</b> | 日薪 ¥'+fmt(sal)+'</div>';
  if(G.loan>0)h+='<div>🏦 贷款: <b style="color:var(--accent)">¥'+fmt(G.loan)+'</b>（剩'+G.loanDaysLeft+'天）</div>';
  h+='</div><button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>';
  openModal(h);
}

// ============ 日历查看 ============
function showDayByCalendar(d){
  let rec=G.allDailyRecords[d];
  if(!rec||!rec.sales||rec.sales.length===0){
    openModal('<h3>📅 D'+d+' 无销售记录</h3><button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>');
    return;
  }
  let total=rec.sales.reduce((s,l)=>s+safenum(l.sold)*safenum(l.price),0);
  let h='<h3>📅 D'+d+' 经营记录</h3><div style="font-size:14px;margin:6px 0">总营收: <b style="color:var(--gold)">¥'+fmt(total)+'</b></div>';
  rec.sales.forEach(l=>h+='<div class="info-row"><span>'+safenum(l.emoji||'')+' '+safenum(l.name||'')+'</span><span>'+safenum(l.sold)+'件 ¥'+fmt(safenum(l.sold)*safenum(l.price))+'</span></div>');
  h+='<button class="btn ghost" onclick="closeModal()" style="margin-top:10px;width:100%;padding:8px">关闭</button>';
  openModal(h);
}

// ============ 日志记录当天销售 ============
let _origNextDay=nextDay;
nextDay=function(){
  _origNextDay();
  // 保存当天记录
  if(!G.allDailyRecords[G.day-1])G.allDailyRecords[G.day-1]={sales:[],events:[],revenue:0};
  G.allDailyRecords[G.day-1]={sales:G.dailyLog.slice(),events:[],revenue:G.dailyRevenue};
}

// ============ 初始化 ============
function init(){
  initRivals();initMarket();
  document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();nextDay();}});
  render();
}
init();
</script>
</body>
